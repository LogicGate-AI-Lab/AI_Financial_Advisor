name: Daily News Pipeline (Backup)

on:
  # Disabled scheduled trigger — server cron is primary.
  # Uncomment below to re-enable as backup:
  # schedule:
  #   - cron: "0 2 * * *"
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run news pipeline (English)
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          NEWS_API_API_KEY: ${{ secrets.NEWS_API_API_KEY }}
        run: ai-advisor news run --lang en
